<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/stylelogin.css">
</head>
<body>
    <!-- Contenedor principal -->
    <div class="contenedor">
        <!-- Columna 1 -->
        <div class="columna-uno">
            <img src="img/logo.png" alt="Logo">
        </div>
        <!-- Columna 2 -->
        <div class="columna-dos">
            <form action="inicio.html" method="get">
            <p><b>Inicio de sesión</b></p>
            <label for="username">Usuario:</label><br>
            <input type="text" id="username" name="username" placeholder="Ingresa tu usuario"><br>
            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña"><br>
            <button type="submit">Iniciar sesión</button><br>
            </form>
            <h2>¿Olvidó su contraseña?</h2><button>Recuperar</button>
        </div>
    </div>
</body>
</html>
