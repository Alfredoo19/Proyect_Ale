<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SOLICITUD DE REGISTRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/stylesolicitud.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="solicitudregistro.html">SOLICITUD DE REGISTRO</a></li>
            <li><a href="registroex.html">REGISTRO DE EXPEDIENTE</a></li>
            <li><a href="registrocaso.html">REGISTRO DE CASO</a></li>
        </ul>
    </nav>
    <div class="contenedor-principal">
        <h1>SOLICITU DE REGISTRO</h1>
        <div class="contenedor-secundario">
            <!--Columna 1-->
            <div class="columna-uno">
                <label for="municipio">Municipio:</label>
                <select id="municipio" name="municipio">
                    <option>Balancán</option>
                    <option>Centla</option>
                    <option>Centro</option>
                    <option>Comalcalco</option>
                    <option>Cunduacán</option>
                    <option>Emiliano Zapata</option>
                    <option>Huimanguillo</option>
                    <option>Jalapa</option>
                    <option>Jalpa de Méndez</option>
                    <option>Jonuta</option>
                    <option>Macuspana</option>
                    <option>Nacajuca</option>
                    <option>Paraíso</option>
                    <option>Tacotalpa</option>
                    <option>Teapa</option>
                    <option>Tenosique</option>
                </select><br><br>
                <label>Fecha</label>
                <input type="date">
            </div>
            <!--Columna dos-->
            <div class="columna-dos">
                <label for="juzgado">Juzgado:</label>
                <input type="text" id="juzgado" name="juzgado" placeholder="Escriba el juzgado"><br><br>
                
                <label for="expediente">No. Expediente (Opcional):</label>
                <input type="text" id="expediente" name="expediente" placeholder="Ej. 999/2023">
                <p>Formato: [Número de expediente]/[Año del Expediente] Ej. 999/2023</p>
                
                <button type="button" onclick="buscarPorNoExpediente()">Buscar</button>

                <div id="resultado" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
    <script>
        async function buscarPorNoExpediente() {
            const noExpediente = document.getElementById('expediente').value.trim();
            const resultado = document.getElementById('resultado');

            if (!noExpediente) {
                alert('Ingresa No. Expediente para buscar');
                return;
            }

            const res = await fetch('http://localhost:3000/api/casos?no_expediente=' + encodeURIComponent(noExpediente));
            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
                alert(data.error || 'Error al buscar');
                return;
            }

            if (!data.casos || data.casos.length === 0) {
                resultado.innerHTML = '<p>No se encontraron casos con ese No. Expediente.</p>';
                return;
            }

            const items = data.casos.map(c => {
                const archivo = c.archivo_path ? `<a href="http://localhost:3000${c.archivo_path}" target="_blank">Ver archivo</a>` : '';
                return `
                    <div style="border:1px solid #000; padding:10px; margin:10px 0;">
                        <div><b>Promovente:</b> ${c.promovente}</div>
                        <div><b>Demandado:</b> ${c.demandado}</div>
                        <div><b>Juzgado:</b> ${c.juzgado}</div>
                        <div><b>Municipio:</b> ${c.municipio}</div>
                        <div><b>No. Expediente:</b> ${c.no_expediente || ''}</div>
                        <div>${archivo}</div>
                    </div>
                `;
            }).join('');

            resultado.innerHTML = `<h2>Resultados (${data.count})</h2>` + items;
        }
    </script>
</body>
</html>
